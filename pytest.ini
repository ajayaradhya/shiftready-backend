[pytest]
# 'auto' mode treats all 'async def' tests as asyncio tests automatically
asyncio_mode = auto

# Coverage configuration: 
# --cov=app: Measure coverage of the 'app' directory
# --cov-report=term-missing: Show missing lines in terminal
addopts = --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml

# Silence noisy 3rd party deprecation warnings (e.g. google-genai)
filterwarnings =
    ignore:_UnionGenericAlias is deprecated:DeprecationWarning
    ignore:coroutine '.*' was never awaited:RuntimeWarning