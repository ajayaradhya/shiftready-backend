timeout: 1200s
options:
  logging: CLOUD_LOGGING
  machineType: 'E2_HIGHCPU_8'

steps:
  # 1. Static Analysis: ruff check + format check + mypy
  - name: 'python:3.13-slim'
    id: 'lint'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install ruff mypy --quiet
        ruff check . --exclude scripts
        ruff format --check . --exclude scripts
        mypy app/ --ignore-missing-imports --no-strict-optional --explicit-package-bases

  # 2. Unit tests (mocked — no Firestore emulator)
  # Integration tests run locally only: make test-integration
  - name: 'python:3.13-slim'
    id: 'run-unit-tests'
    waitFor: ['lint']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        pip install -r requirements.txt --quiet
        python -m pytest tests/ --ignore=tests/integration --cov=app --cov-report=term-missing -v

  # 3. Pull the latest image for Docker layer caching
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-cache'
    waitFor: ['run-unit-tests']
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest || exit 0']

  # 4. Build the Production Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    waitFor: ['pull-cache']
    args: [
      'build',
      '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA',
      '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest',
      '--cache-from', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest',
      '.'
    ]

  # 5. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    waitFor: ['build-image']
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}']

  # 6. Scan pushed image for vulnerabilities
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'scan-image'
    waitFor: ['push-image']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud artifacts docker images scan \
          ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA \
          --remote \
          --format='value(response.scan)' > /tmp/scan_id.txt
        gcloud artifacts docker images list-vulnerabilities $(cat /tmp/scan_id.txt) \
          --format='table(vulnerability.effectiveSeverity,vulnerability.cvssScore,noteName,vulnerability.packageIssue[0].affectedPackage)' \
          --occurrence-filter='severity="CRITICAL" OR severity="HIGH"' || true

  # 7. Deploy Firestore indexes
  - name: 'node:20-slim'
    id: 'deploy-indexes'
    waitFor: ['push-image']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        firebase deploy --only firestore:indexes,firestore:rules --project $PROJECT_ID --non-interactive

  # 8. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['scan-image', 'deploy-indexes']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '3'
      - '--update-env-vars'
      - '^|^ALLOWED_ORIGINS=${_ALLOWED_ORIGINS}|GCP_PROJECT_ID=$PROJECT_ID|SENTRY_DSN=${_SENTRY_DSN}'
      - '--remove-env-vars'
      - 'GCP_UPLOAD_BUCKET'
      - '--update-secrets'
      - 'GCP_UPLOAD_BUCKET=myrio-gcp-upload-bucket:latest'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: australia-southeast1
  _SERVICE_NAME: myrio-api
  _REPOSITORY: myrio-repo
  _IMAGE_NAME: backend-image
  _ALLOWED_ORIGINS: '["https://myrio.com.au","https://www.myrio.com.au"]'
  _SENTRY_DSN: ''  # Override in Cloud Build trigger once Sentry project is created
