steps:
  # 1. Run Unit Tests with Coverage
  - name: 'python:3.13-slim'
    id: 'run-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements-test.txt
        pytest

  # 2. Build the Production Image (only if tests pass)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args: ['build', '-t', 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/shiftready-repo/backend-image:$SHORT_SHA', '.']

  # 3. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: ['push', 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/shiftready-repo/backend-image:$SHORT_SHA']

  # 4. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'shiftready-backend'
      - '--image'
      - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/shiftready-repo/backend-image:$SHORT_SHA'
      - '--region'
      - 'australia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/shiftready-repo/backend-image:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING