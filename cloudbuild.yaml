steps:
  # 1. Build the container image using Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/shiftready-repo/shiftready-api:$COMMIT_SHA', 
      '.'
    ]

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'australia-southeast1-docker.pkg.dev/$PROJECT_ID/shiftready-repo/shiftready-api:$COMMIT_SHA'
    ]

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'shiftready-api'
      - '--image'
      - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/shiftready-repo/shiftready-api:$COMMIT_SHA'
      - '--region'
      - 'australia-southeast1'
      - '--service-account'
      - 'shiftready-backend@$PROJECT_ID.iam.gserviceaccount.com'
      - '--allow-unauthenticated'

# This allows Cloud Build to track which images were produced by the build
images:
  - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/shiftready-repo/shiftready-api:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true # Allows us to use variables like $PROJECT_ID