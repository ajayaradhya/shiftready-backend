timeout: 1200s
options:
  logging: CLOUD_LOGGING
  machineType: 'E2_HIGHCPU_8'

steps:
  # 1. Static Analysis (Linting)
  - name: 'python:3.13-slim'
    id: 'lint'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install ruff
        ruff check . --exclude scripts

  # 2. Run Tests with Coverage (includes integration tests against Firestore emulator)
  # - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  #   id: 'run-tests'
  #   waitFor: ['lint']
  #   entrypoint: 'bash'
  #   args:
  #     - '-c'
  #     - |
  #       set -e

  #       # ── Java is required by the Firestore emulator ─────────────────────────
  #       apt-get update -qq
  #       apt-get install -y -qq --no-install-recommends default-jre-headless

  #       # ── Install Firestore emulator via gcloud component ───────────────────
  #       gcloud components install cloud-firestore-emulator --quiet

  #       # ── Install Python dependencies ────────────────────────────────────────
  #       pip3 install -r requirements.txt --quiet

  #       # ── Start Firestore emulator in background ─────────────────────────────
  #       gcloud beta emulators firestore start --host-port=127.0.0.1:8089 &
  #       EMULATOR_PID=$$!

  #       # ── Wait until the emulator REST endpoint responds (max 30 s) ──────────
  #       echo "Waiting for Firestore emulator..."
  #       for i in $$(seq 1 30); do
  #         curl -sf http://127.0.0.1:8089/ >/dev/null 2>&1 && break || sleep 1
  #       done
  #       echo "Firestore emulator ready"

  #       # ── Run tests ─────────────────────────────────────────────────────────
  #       python3 -m pytest
  #       EXIT_CODE=$$?

  #       kill $$EMULATOR_PID 2>/dev/null || true
  #       exit $$EXIT_CODE

  # 3. Pull the latest image for Docker layer caching
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-cache'
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest || exit 0']

  # 4. Build the Production Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args: [
      'build',
      '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA',
      '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest',
      '--cache-from', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest',
      '.'
    ]

  # 5. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}']

  # 6. Scan pushed image for vulnerabilities
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'scan-image'
    waitFor: ['push-image']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud artifacts docker images scan \
          ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA \
          --remote \
          --format='value(response.scan)' > /tmp/scan_id.txt
        gcloud artifacts docker images list-vulnerabilities $(cat /tmp/scan_id.txt) \
          --format='table(vulnerability.effectiveSeverity,vulnerability.cvssScore,noteName,vulnerability.packageIssue[0].affectedPackage)' \
          --occurrence-filter='severity="CRITICAL" OR severity="HIGH"' || true

  # 7. Deploy Firestore indexes
  - name: 'node:20-slim'
    id: 'deploy-indexes'
    waitFor: ['push-image']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        firebase deploy --only firestore:indexes,firestore:rules,storage --project $PROJECT_ID --non-interactive

  # 8. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '3'
      - '--update-env-vars'
      - 'ALLOWED_ORIGINS=${_ALLOWED_ORIGINS},GCP_PROJECT_ID=$PROJECT_ID,SENTRY_DSN=${_SENTRY_DSN}'
      - '--update-secrets'
      - 'GCP_UPLOAD_BUCKET=shiftready-gcp-upload-bucket:latest'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: australia-southeast1
  _SERVICE_NAME: shiftready-api
  _REPOSITORY: shiftready-repo
  _IMAGE_NAME: backend-image
  _ALLOWED_ORIGINS: '["https://shiftready-ui-7nkqrak2ta-ts.a.run.app"]'
  _SENTRY_DSN: ''  # Override in Cloud Build trigger once Sentry project is created