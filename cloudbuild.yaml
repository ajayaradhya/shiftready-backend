timeout: 1200s
options:
  logging: CLOUD_LOGGING
  machineType: 'E2_HIGHCPU_8'

steps:
  # 1. Static Analysis (Linting)
  - name: 'python:3.13-slim'
    id: 'lint'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install ruff
        ruff check . --exclude scripts

  # 2. Run Tests with Coverage (includes integration tests against Firestore emulator)
  # - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  #   id: 'run-tests'
  #   waitFor: ['lint']
  #   entrypoint: 'bash'
  #   args:
  #     - '-c'
  #     - |
  #       set -e

  #       # ── Java is required by the Firestore emulator ─────────────────────────
  #       apt-get update -qq
  #       apt-get install -y -qq --no-install-recommends default-jre-headless

  #       # ── Install Firestore emulator via gcloud component ───────────────────
  #       gcloud components install cloud-firestore-emulator --quiet

  #       # ── Install Python dependencies ────────────────────────────────────────
  #       pip3 install -r requirements.txt --quiet

  #       # ── Start Firestore emulator in background ─────────────────────────────
  #       gcloud beta emulators firestore start --host-port=127.0.0.1:8089 &
  #       EMULATOR_PID=$$!

  #       # ── Wait until the emulator REST endpoint responds (max 30 s) ──────────
  #       echo "Waiting for Firestore emulator..."
  #       for i in $$(seq 1 30); do
  #         curl -sf http://127.0.0.1:8089/ >/dev/null 2>&1 && break || sleep 1
  #       done
  #       echo "Firestore emulator ready"

  #       # ── Run tests ─────────────────────────────────────────────────────────
  #       python3 -m pytest
  #       EXIT_CODE=$$?

  #       kill $$EMULATOR_PID 2>/dev/null || true
  #       exit $$EXIT_CODE

  # 3. Pull the latest image for Docker layer caching
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-cache'
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest || exit 0']

  # 4. Build the Production Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args: [
      'build',
      '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA',
      '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest',
      '--cache-from', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest',
      '.'
    ]

  # 5. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}']

  # 6. Deploy Firestore indexes
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-indexes'
    waitFor: ['push-image']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        firebase deploy --only firestore:indexes --project $PROJECT_ID --non-interactive

  # 7. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

  # 8. Pull frame-extractor image for layer caching
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-frame-extractor-cache'
    waitFor: ['deploy']
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_FRAME_JOB_IMAGE}:latest || exit 0']

  # 9. Build frame-extractor job image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frame-extractor'
    waitFor: ['pull-frame-extractor-cache']
    args: [
      'build',
      '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_FRAME_JOB_IMAGE}:$SHORT_SHA',
      '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_FRAME_JOB_IMAGE}:latest',
      '--cache-from', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_FRAME_JOB_IMAGE}:latest',
      '-f', 'jobs/frame_extractor/Dockerfile',
      'jobs/frame_extractor',
    ]

  # 10. Push frame-extractor image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frame-extractor'
    waitFor: ['build-frame-extractor']
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_FRAME_JOB_IMAGE}']

  # 11. Create or update Cloud Run Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frame-extractor-job'
    waitFor: ['push-frame-extractor']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_FRAME_JOB_IMAGE}:$SHORT_SHA"
        JOB_ARGS="--image=$$IMAGE \
          --region=${_REGION} \
          --service-account=${_JOB_SERVICE_ACCOUNT} \
          --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GCP_UPLOAD_BUCKET=${_UPLOAD_BUCKET} \
          --memory=2Gi \
          --cpu=2 \
          --max-retries=2 \
          --task-timeout=3600"

        if gcloud run jobs describe ${_FRAME_JOB_NAME} --region=${_REGION} --project=$PROJECT_ID 2>/dev/null; then
          gcloud run jobs update ${_FRAME_JOB_NAME} $$JOB_ARGS
        else
          gcloud run jobs create ${_FRAME_JOB_NAME} $$JOB_ARGS
        fi

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_FRAME_JOB_IMAGE}:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_FRAME_JOB_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: australia-southeast1
  _SERVICE_NAME: shiftready-backend
  _REPOSITORY: shiftready-repo
  _IMAGE_NAME: backend-image
  _FRAME_JOB_IMAGE: frame-extractor-image
  _FRAME_JOB_NAME: frame-extractor
  _JOB_SERVICE_ACCOUNT: shiftready-backend@$PROJECT_ID.iam.gserviceaccount.com
  _UPLOAD_BUCKET: shiftready-uploads